<style>
  .shipping-header { padding: var(--spacing-lg); background: #fff; border-bottom: 1px solid #dee2e6; }
  .shipping-card { background: #fff; border: 1px solid rgba(0,0,0,0.08); border-radius: 10px; padding: var(--spacing-lg); margin-bottom: var(--spacing-md); }
  .shipping-table { width: 100%; border-collapse: collapse; }
  .shipping-table th, .shipping-table td { border-bottom: 1px solid #e9ecef; padding: 0.65rem; text-align: left; }
  .btn-action { border: none; border-radius: 8px; padding: 0.5rem 0.75rem; cursor: pointer; font-weight: 600; }
  .btn-primary { background: #1b5e20; color: #fff; }
  .btn-danger { background: #fce8e6; color: #c5221f; }
  .shipping-notice { margin-top: .75rem; padding: .6rem .8rem; border-radius: 8px; display:none; }
  .shipping-notice.show { display:block; background:#e8f5e9; color:#1b5e20; }
  .shipping-notice.error { background:#fce8e6; color:#c5221f; }
  .shipping-modal { position: fixed; inset: 0; background: rgba(15,23,42,.45); display:none; align-items:center; justify-content:center; z-index:1000; }
  .shipping-modal-card { width: min(680px, 92vw); background:#fff; border-radius:12px; padding: 20px; }
  .shipping-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
  .shipping-grid input,.shipping-grid select { width:100%; padding:.6rem .7rem; border:1px solid #d8dee4; border-radius:8px; }
</style>
<div class="container content-wrapper" id="shipping-admin-root">
  <div class="shipping-header section">
    <h1>Manajemen Ongkir</h1>
    <p>Kelola zona ongkir aktif untuk checkout.</p>
  </div>

  <div class="shipping-card">
    <button id="open-shipping-modal-btn" class="btn-action btn-primary">+ Tambah Zona Ongkir</button>
    <div id="shipping-admin-notice" class="shipping-notice"></div>
  </div>

  <div class="shipping-card">
    <h3 style="margin-top:0;">Daftar Zona Ongkir</h3>
    <table class="shipping-table">
      <thead><tr><th>No</th><th>Wilayah</th><th>Harga Ongkir</th><th>Estimasi</th><th>Aksi</th></tr></thead>
      <tbody id="shipping-rates-tbody"></tbody>
    </table>
  </div>
</div>

<div id="shipping-modal" class="shipping-modal">
  <div class="shipping-modal-card">
    <h3 id="shipping-modal-title">Tambah Zona Ongkir</h3>
    <form id="shipping-form" onsubmit="return false;">
      <input id="editing-rate-id" type="hidden">
      <div class="shipping-grid">
        <div><label>Tipe wilayah</label><select id="zone-type"><option value="district">Kecamatan</option><option value="regency">Kabupaten</option><option value="province">Provinsi</option></select></div>
        <div><label>Provinsi</label><input id="province" placeholder="Jawa Timur"></div>
        <div><label>Kabupaten</label><input id="regency" placeholder="Malang"></div>
        <div><label>Kecamatan</label><input id="district" placeholder="Turen"></div>
        <div><label>Harga/kg</label><input id="price-per-kg" type="number" min="0" placeholder="8000"></div>
        <div><label>Estimasi</label><input id="estimate" placeholder="1-2 hari"></div>
        <div style="display:flex; align-items:end; gap:8px;"><label><input id="is-international" type="checkbox"> Internasional</label></div>
      </div>
      <div style="margin-top:16px; display:flex; gap:10px; justify-content:flex-end;">
        <button id="close-shipping-modal-btn" type="button" class="btn-action">Batal</button>
        <button id="save-rate-btn" type="button" class="btn-action btn-primary">Simpan</button>
      </div>
    </form>
  </div>
</div>
