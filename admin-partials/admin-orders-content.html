
<div class="container content-wrapper" id="orders-admin-root">
    <div class="admin-page-header section">
        <h1 class="page-title">Manajemen Pesanan</h1>
        <p>Kelola pesanan masuk dengan data langsung dari database.</p>
    </div>
    <div id="admin-message-container" class="message-container" role="alert" hidden></div>
    <div class="admin-grid section" aria-label="Statistik pesanan">
        <div class="admin-stat-card"><span>Total Orders</span><strong data-order-stat="total">0</strong></div>
        <div class="admin-stat-card"><span>Pending Orders</span><strong data-order-stat="pending">0</strong></div>
        <div class="admin-stat-card"><span>Diproses</span><strong data-order-stat="processing">0</strong></div>
        <div class="admin-stat-card"><span>Dikirim</span><strong data-order-stat="shipped">0</strong></div>
        <div class="admin-stat-card"><span>Selesai</span><strong data-order-stat="completed">0</strong></div>
    </div>
    <div class="admin-toolbar filter-container">
        <div class="filter-group"><label for="search-order-id">Search Order ID</label><input id="search-order-id" class="filter-input" type="search" placeholder="#CARITA..."></div>
        <div class="filter-group"><label for="search-customer">Search Customer</label><input id="search-customer" class="filter-input" type="search" placeholder="Nama customer"></div>
        <div class="filter-group"><label for="filter-status">Filter Status</label><select id="filter-status" class="filter-select"><option value="all">Semua Status</option><option value="Pending">Pending</option><option value="Diproses">Diproses</option><option value="Dikirim">Dikirim</option><option value="Selesai">Selesai</option><option value="Dibatalkan">Dibatalkan</option></select></div>
        <div class="filter-group"><label for="sort-time">Sort By Date</label><select id="sort-time" class="filter-select"><option value="newest">Terbaru</option><option value="oldest">Terlama</option></select></div>
        <button type="button" id="reset-order-filters" class="admin-button admin-button--secondary reset-filter-btn">Reset Filter</button>
    </div>
    <div class="admin-table-wrap"><table class="admin-table orders-table"><thead><tr><th>Order</th><th>Customer</th><th>Total</th><th>Status</th><th>Payment</th><th>Tracking</th><th>Updated</th><th>Action</th></tr></thead><tbody id="orders-grid"></tbody></table></div>
    <p id="loading-message" class="admin-state admin-state--loading" role="status" aria-live="polite">Memuat pesanan...</p>
</div>
