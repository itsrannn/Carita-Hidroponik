<div x-data="contentManager" x-init="init()">
<style>
    .dashboard-header { padding: 1.5rem; background-color: white; border-bottom: 1px solid #dee2e6; margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center; }
    .dashboard-header-text h1 { margin: 0; }
    .dashboard-header-text p { margin: 0; margin-top: 0.25rem; color: #6c757d; }
    .content-card { background-color: #fff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.06); border: 1px solid rgba(0,0,0,0.08); padding: 2rem; margin-bottom: 2rem; }
    .data-table-wrapper { overflow-x: auto; }
    .data-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.95rem; }
    .data-table thead th { padding: 1rem; background-color: #f8f9fa; font-weight: 600; color: #495057; border-bottom: 2px solid #dee2e6; }
    .data-table tbody tr { border-bottom: 1px solid #dee2e6; }
    .data-table tbody td { padding: 1rem; vertical-align: middle; color: #212529; }
    .data-table .item-image { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; }
    .data-table .action-buttons { display: flex; gap: 0.5rem; }
    .btn-edit, .btn-delete { border: none; padding: 0.5rem 1rem; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 0.9rem; }
    .btn-edit { background-color: #e7f3ff; color: #0d6efd; text-decoration: none; }
    .btn-delete { background-color: #fce8e6; color: #c5221f; }
    .btn-add { background-color: #15803d; color: white; border: none; padding: 0.7rem 1.2rem; border-radius: 8px; font-weight: 600; cursor: pointer; text-decoration: none; }
    .tabs { display: flex; border-bottom: 1px solid #dee2e6; margin-bottom: 2rem; }
    .tab-button { padding: 1rem 1.5rem; cursor: pointer; border: none; background: none; font-size: 1rem; font-weight: 600; color: #6c757d; border-bottom: 3px solid transparent; }
    .tab-button.active { color: var(--primary); border-bottom-color: var(--primary); }
    .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .search-input { padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid #dee2e6; font-size: 0.95rem; width: 100%; max-width: 300px; }
    .discount-badge { display: inline-block; padding: 0.2rem 0.5rem; font-size: 0.75rem; font-weight: 600; color: #fff; background-color: #15803d; border-radius: 0.5rem; margin-left: 0.5rem; }
    .bulk-discount-section { background-color: #f8f9fa; border: 1px solid #dee2e6; border-radius: 8px; padding: 1.5rem; margin-bottom: 2rem; }
    .bulk-discount-controls { display: flex; gap: 1rem; align-items: center; }
    .bulk-discount-controls input { padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid #dee2e6; font-size: 0.95rem; width: 150px; }
    .bulk-discount-controls button { background-color: #dc3545; color: white; border: none; padding: 0.7rem 1.2rem; border-radius: 8px; font-weight: 600; cursor: pointer; }
</style>
<div class="container">
    <div class="dashboard-header">
        <div class="dashboard-header-text">
            <h1 class="page-title" x-text="$store.i18n.t('admin.products.title')">Content Management</h1>
            <p x-text="$store.i18n.t('admin.products.description')">Manage the products and news displayed on your site.</p>
        </div>
        <a :href="`admin-editor.html?type=${activeTab}&action=add`" class="btn-add"><span x-show="activeTab === 'products'">+ Add Product</span><span x-show="activeTab === 'news'">+ Add News</span></a>
    </div>
    <div class="content-card">
        <div class="tabs"><button type="button" @click="activeTab = 'products'" :class="{ 'active': activeTab === 'products' }" class="tab-button">Product Management</button><button type="button" @click="activeTab = 'news'" :class="{ 'active': activeTab === 'news' }" class="tab-button">News Management</button></div>
        <div x-show="activeTab === 'products'" class="tab-content">
            <div class="bulk-discount-section"><h3>Bulk Discount Tool</h3><p>Apply a percentage discount to all products that don't have a fixed discount price set.</p><div class="bulk-discount-controls"><input type="number" x-model.number="bulkDiscountPercent" min="1" max="90"><button @click="applyBulkDiscount()">Apply Discount</button></div></div>
            <div class="table-header"><h2>Product List</h2><input type="text" x-model="searchQuery.products" placeholder="Search products..." class="search-input"></div>
            <div class="data-table-wrapper"><table class="data-table"><thead><tr><th>Image</th><th>Product</th><th>Category</th><th>Price</th><th>Actions</th></tr></thead><tbody><template x-if="isLoading.products"><tr><td colspan="5" style="text-align: center;">Loading products...</td></tr></template><template x-if="!isLoading.products && filteredProducts.length === 0"><tr><td colspan="5" style="text-align: center;">No matching products found.</td></tr></template><template x-for="product in filteredProducts" :key="product.id"><tr><td><img :src="window.fixImagePath(product.image_url)" :alt="product.name.en" class="item-image"></td><td><span x-text="product.name[$store.i18n.lang] || product.name.en"></span></td><td x-text="product.category"></td><td x-text="window.formatRupiah(product.price)"></td><td><div class="action-buttons"><a :href="`admin-editor.html?type=product&action=edit&id=${product.id}`" class="btn-edit">Edit</a><button type="button" class="btn-delete" @click="deleteItem(product.id, product.image_url)">Delete</button></div></td></tr></template></tbody></table></div>
        </div>
        <div x-show="activeTab === 'news'" class="tab-content">
            <div class="table-header"><h2>News List</h2><input type="text" x-model="searchQuery.news" placeholder="Search news..." class="search-input"></div>
            <div class="data-table-wrapper"><table class="data-table"><thead><tr><th>Image</th><th>Title</th><th>Excerpt</th><th>Actions</th></tr></thead><tbody><template x-if="isLoading.news"><tr><td colspan="4" style="text-align: center;">Loading news...</td></tr></template><template x-if="!isLoading.news && filteredNews.length === 0"><tr><td colspan="4" style="text-align: center;">No matching news found.</td></tr></template><template x-for="item in filteredNews" :key="item.id"><tr><td><img :src="window.fixImagePath(item.image_url)" :alt="item.title.en" class="item-image"></td><td x-text="item.title[$store.i18n.lang] || item.title.en"></td><td x-text="item.excerpt[$store.i18n.lang] || item.excerpt.en"></td><td><div class="action-buttons"><a :href="`admin-editor.html?type=news&action=edit&id=${item.id}`" class="btn-edit">Edit</a><button type="button" class="btn-delete" @click="deleteItem(item.id, item.image_url)">Delete</button></div></td></tr></template></tbody></table></div>
        </div>
    </div>
</div>
</div>
