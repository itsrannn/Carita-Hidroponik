<div x-data="contentManager" x-init="init()" class="cms-page">

<div class="container content-wrapper">
    <div class="cms-header dashboard-header section">
        <div><div class="cms-eyebrow">Modern CMS</div><h1 class="page-title">Content Management</h1><p>Manage products and news using live data from the existing admin data source.</p></div>
        <a :href="`admin-editor.html?type=${activeTab === 'products' ? 'product' : 'news'}&action=add`" class="admin-button admin-button--primary btn-add"><i data-feather="plus"></i><span x-text="activeTab === 'products' ? 'Create Product' : 'Create News'"></span></a>
    </div>
    <div class="admin-card section">
        <div class="cms-tabs"><button type="button" @click="switchTab('products')" :class="{ active: activeTab === 'products' }" class="tab-button">Products</button><button type="button" @click="switchTab('news')" :class="{ active: activeTab === 'news' }" class="tab-button">News</button></div>
        <template x-if="activeTab === 'products'"><section>
            <div class="admin-toolbar cms-toolbar"><input type="search" x-model="searchQuery.products" placeholder="Search product or category..." class="search-input"><select x-model="filters.products.category" class="cms-select"><option value="all">All categories</option><template x-for="category in productCategories" :key="category"><option :value="category" x-text="category"></option></template></select><select x-model="sort.products" class="cms-select"><option value="newest">Newest</option><option value="name">Name</option><option value="priceAsc">Price ↑</option><option value="priceDesc">Price ↓</option><option value="stockAsc">Stock ↑</option></select><button class="admin-button admin-button--secondary btn-secondary" type="button" @click="resetProductsView()">Reset</button></div>
            <div class="bulk-bar"><span x-text="`${selectedProducts.length} selected · ${paginatedProducts.length} shown`"></span><div class="admin-table-actions action-buttons"><button class="admin-button admin-button--secondary btn-secondary" type="button" @click="bulkPublishProducts()" :disabled="!selectedProducts.length">Bulk publish</button><button class="admin-button admin-button--danger btn-danger" type="button" @click="bulkDeleteProducts()" :disabled="!selectedProducts.length">Bulk delete</button></div></div>
            <div class="admin-table-wrap data-table-wrapper"><table class="admin-table data-table"><thead><tr><th><input type="checkbox" :checked="pageProductIds.length && pageProductIds.every(id => selectedProducts.includes(id))" @change="toggleProductPage($event.target.checked)"></th><th>Image</th><th @click="sort.products='name'">Product</th><th>Category</th><th @click="sort.products = sort.products === 'priceAsc' ? 'priceDesc' : 'priceAsc'">Price</th><th>Discount</th><th @click="sort.products='stockAsc'">Stock</th><th>Status</th><th>Action</th></tr></thead><tbody>
                <template x-if="isLoading.products"><tr><td colspan="9" class="admin-state admin-state--loading skeleton-state">Loading products...</td></tr></template><template x-if="!isLoading.products && errors.products"><tr><td colspan="9" class="admin-state admin-state--error error-state" x-text="errors.products"></td></tr></template><template x-if="!isLoading.products && !errors.products && paginatedProducts.length === 0"><tr><td colspan="9" class="admin-state admin-state--empty empty-state">No products match your filters.</td></tr></template>
                <template x-for="product in paginatedProducts" :key="product.id"><tr><td><input type="checkbox" :value="product.id" x-model="selectedProducts"></td><td><img :src="window.fixImagePath(product.image_url)" :alt="displayName(product.name, 'Product')" class="item-image"></td><td><div class="product-name" x-text="displayName(product.name, 'Product')"></div><div class="product-meta" x-text="`#${String(product.id).slice(0,8)}`"></div></td><td x-text="product.category || '-'"></td><td x-text="window.formatRupiah(product.price)"></td><td><span class="cms-badge neutral" x-text="product.discount_price ? window.formatRupiah(product.discount_price) : 'No discount'"></span></td><td x-text="product.stock ?? product.quantity ?? '-'"></td><td><span class="cms-badge" :class="isPublished(product) ? 'published' : 'draft'" x-text="isPublished(product) ? 'Published' : 'Draft'"></span></td><td><div class="admin-table-actions action-buttons"><a :href="`admin-editor.html?type=product&action=edit&id=${product.id}`" class="admin-button btn-edit">Edit</a><button type="button" class="admin-button admin-button--danger btn-delete" @click="deleteItem(product.id, product.image_url)">Delete</button></div></td></tr></template>
            </tbody></table></div><div class="pagination"><button class="admin-button admin-button--secondary btn-secondary" @click="productPage=Math.max(1,productPage-1)">Prev</button><span x-text="`Page ${productPage} of ${productTotalPages}`"></span><button class="admin-button admin-button--secondary btn-secondary" @click="productPage=Math.min(productTotalPages,productPage+1)">Next</button></div>
        </section></template>
        <template x-if="activeTab === 'news'"><section>
            <div class="admin-toolbar cms-toolbar"><input type="search" x-model="searchQuery.news" placeholder="Search title or excerpt..." class="search-input"><select x-model="filters.news.status" class="cms-select"><option value="all">All status</option><option value="published">Published</option><option value="draft">Draft</option></select><select x-model="sort.news" class="cms-select"><option value="newest">Newest</option><option value="title">Title</option></select><button class="admin-button admin-button--secondary btn-secondary" type="button" @click="resetNewsView()">Reset</button></div>
            <div class="admin-table-wrap data-table-wrapper"><table class="admin-table data-table"><thead><tr><th>Image</th><th>Title</th><th>Excerpt</th><th>Status</th><th>Action</th></tr></thead><tbody><template x-if="isLoading.news"><tr><td colspan="5" class="admin-state admin-state--loading skeleton-state">Loading news...</td></tr></template><template x-if="!isLoading.news && errors.news"><tr><td colspan="5" class="admin-state admin-state--error error-state" x-text="errors.news"></td></tr></template><template x-if="!isLoading.news && !errors.news && paginatedNews.length === 0"><tr><td colspan="5" class="admin-state admin-state--empty empty-state">No news articles match your filters.</td></tr></template><template x-for="item in paginatedNews" :key="item.id"><tr><td><img :src="window.fixImagePath(item.image_url)" :alt="displayName(item.title, 'News')" class="item-image"></td><td><div class="product-name" x-text="displayName(item.title, 'News')"></div></td><td x-text="displayName(item.excerpt, '-')"></td><td><span class="cms-badge" :class="isPublished(item) ? 'published' : 'draft'" x-text="isPublished(item) ? 'Published' : 'Draft'"></span></td><td><div class="admin-table-actions action-buttons"><a :href="`admin-editor.html?type=news&action=edit&id=${item.id}`" class="admin-button btn-edit">Edit</a><button type="button" class="admin-button admin-button--danger btn-delete" @click="deleteItem(item.id, item.image_url)">Delete</button></div></td></tr></template></tbody></table></div><div class="pagination"><button class="admin-button admin-button--secondary btn-secondary" @click="newsPage=Math.max(1,newsPage-1)">Prev</button><span x-text="`Page ${newsPage} of ${newsTotalPages}`"></span><button class="admin-button admin-button--secondary btn-secondary" @click="newsPage=Math.min(newsTotalPages,newsPage+1)">Next</button></div>
        </section></template>
    </div>
</div>
</div>
