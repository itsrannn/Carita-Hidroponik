<div x-data="contentManager" x-init="init()" class="cms-page">

<div class="container content-wrapper">
    <div class="cms-header dashboard-header section">
        <div><div class="cms-eyebrow">CMS Admin</div><h1 class="page-title">Manajemen Produk</h1><p>Kelola produk dan berita memakai data langsung dari database admin.</p></div>
        <a :href="`admin-editor.html?type=${activeTab === 'products' ? 'product' : 'news'}&action=add`" class="admin-button admin-button--primary btn-add"><i data-feather="plus"></i><span x-text="activeTab === 'products' ? 'Tambah Produk' : 'Tambah Berita'"></span></a>
    </div>
    <div class="admin-card section">
        <div class="cms-tabs"><button type="button" @click="switchTab('products')" :class="{ active: activeTab === 'products' }" class="tab-button">Produk</button><button type="button" @click="switchTab('news')" :class="{ active: activeTab === 'news' }" class="tab-button">Berita</button></div>
        <template x-if="activeTab === 'products'"><section>
            <div class="admin-toolbar cms-toolbar"><input type="search" x-model="searchQuery.products" placeholder="Cari produk..." class="search-input"><select x-model="filters.products.category" class="cms-select"><option value="all">Semua Kategori</option><template x-for="category in productCategories" :key="category"><option :value="category" x-text="category"></option></template></select><select x-model="sort.products" class="cms-select"><option value="newest">Terbaru</option><option value="name">Nama</option><option value="priceAsc">Harga ↑</option><option value="priceDesc">Harga ↓</option><option value="stockAsc">Stok ↑</option></select><button class="admin-button admin-button--secondary btn-secondary" type="button" @click="resetProductsView()">Reset</button></div>
            <div class="bulk-bar"><span x-text="`${selectedProducts.length} dipilih · ${paginatedProducts.length} ditampilkan`"></span><div class="admin-table-actions action-buttons"><button class="admin-button admin-button--secondary btn-secondary" type="button" @click="bulkPublishProducts()" :disabled="!selectedProducts.length">Terbitkan Terpilih</button><button class="admin-button admin-button--danger btn-danger" type="button" @click="bulkDeleteProducts()" :disabled="!selectedProducts.length">Hapus Terpilih</button></div></div>
            <div class="admin-table-wrap data-table-wrapper"><table class="admin-table data-table"><thead><tr><th><input type="checkbox" :checked="pageProductIds.length && pageProductIds.every(id => selectedProducts.includes(id))" @change="toggleProductPage($event.target.checked)"></th><th>Gambar</th><th @click="sort.products='name'">Produk</th><th>Kategori</th><th @click="sort.products = sort.products === 'priceAsc' ? 'priceDesc' : 'priceAsc'">Harga</th><th>Diskon</th><th @click="sort.products='stockAsc'">Stok</th><th>Status</th><th>Aksi</th></tr></thead><tbody>
                <template x-if="isLoading.products"><tr><td colspan="9" class="admin-state admin-state--loading skeleton-state">Memuat produk...</td></tr></template><template x-if="!isLoading.products && errors.products"><tr><td colspan="9" class="admin-state admin-state--error error-state" x-text="errors.products"></td></tr></template><template x-if="!isLoading.products && !errors.products && paginatedProducts.length === 0"><tr><td colspan="9" class="admin-state admin-state--empty empty-state">Produk belum tersedia atau tidak cocok dengan filter.</td></tr></template>
                <template x-for="product in paginatedProducts" :key="product.id"><tr><td><input type="checkbox" :value="product.id" x-model="selectedProducts"></td><td><img :src="window.fixImagePath(product.image_url)" :alt="displayName(product.name, 'Produk')" class="item-image"></td><td><div class="product-name" x-text="displayName(product.name, 'Produk')"></div><div class="product-meta" x-text="`#${String(product.id).slice(0,8)}`"></div></td><td x-text="product.category || '-'"></td><td x-text="window.formatRupiah(product.price)"></td><td><span class="cms-badge neutral" x-text="product.discount_price ? window.formatRupiah(product.discount_price) : 'Tanpa diskon'"></span></td><td x-text="product.stock ?? product.quantity ?? '-'"></td><td><span class="cms-badge" :class="isPublished(product) ? 'published' : 'draft'" x-text="isPublished(product) ? 'Terbit' : 'Draf'"></span></td><td><div class="admin-table-actions action-buttons"><a :href="`admin-editor.html?type=product&action=edit&id=${product.id}`" class="admin-button btn-edit">Ubah</a><button type="button" class="admin-button admin-button--danger btn-delete" @click="deleteItem(product.id, product.image_url)">Hapus</button></div></td></tr></template>
            </tbody></table></div><div class="pagination"><button class="admin-button admin-button--secondary btn-secondary" @click="productPage=Math.max(1,productPage-1)">Sebelumnya</button><span x-text="`Halaman ${productPage} dari ${productTotalPages}`"></span><button class="admin-button admin-button--secondary btn-secondary" @click="productPage=Math.min(productTotalPages,productPage+1)">Berikutnya</button></div>
        </section></template>
        <template x-if="activeTab === 'news'"><section>
            <div class="admin-toolbar cms-toolbar"><input type="search" x-model="searchQuery.news" placeholder="Cari berita..." class="search-input"><select x-model="filters.news.status" class="cms-select"><option value="all">Semua Status</option><option value="published">Terbit</option><option value="draft">Draf</option><option value="archived">Diarsipkan</option></select><select x-model="sort.news" class="cms-select"><option value="newest">Terbaru</option><option value="title">Judul</option></select><button class="admin-button admin-button--secondary btn-secondary" type="button" @click="resetNewsView()">Reset</button></div>
            <div class="admin-table-wrap data-table-wrapper"><table class="admin-table data-table"><thead><tr><th>Gambar</th><th>Judul</th><th>Kategori</th><th>Status</th><th>Tanggal Terbit</th><th>Aksi</th></tr></thead><tbody><template x-if="isLoading.news"><tr><td colspan="6" class="admin-state admin-state--loading skeleton-state">Memuat berita...</td></tr></template><template x-if="!isLoading.news && errors.news"><tr><td colspan="6" class="admin-state admin-state--error error-state" x-text="errors.news"></td></tr></template><template x-if="!isLoading.news && !errors.news && paginatedNews.length === 0"><tr><td colspan="6" class="admin-state admin-state--empty empty-state">Berita belum tersedia atau tidak cocok dengan filter.</td></tr></template><template x-for="item in paginatedNews" :key="item.id"><tr><td><img :src="window.fixImagePath(item.image_url)" :alt="displayName(item.title, 'Berita')" class="item-image"></td><td><div class="product-name" x-text="displayName(item.title, 'Berita')"></div></td><td x-text="item.category || '-'"></td><td><span class="cms-badge" :class="isPublished(item) ? 'published' : 'draft'" x-text="isPublished(item) ? 'Terbit' : 'Draf'"></span></td><td x-text="item.published_at || item.created_at ? new Date(item.published_at || item.created_at).toLocaleDateString('id-ID') : '-'"></td><td><div class="admin-table-actions action-buttons"><a :href="`admin-editor.html?type=news&action=edit&id=${item.id}`" class="admin-button btn-edit">Ubah</a><button type="button" class="admin-button admin-button--danger btn-delete" @click="deleteItem(item.id, item.image_url)">Hapus</button></div></td></tr></template></tbody></table></div><div class="pagination"><button class="admin-button admin-button--secondary btn-secondary" @click="newsPage=Math.max(1,newsPage-1)">Sebelumnya</button><span x-text="`Halaman ${newsPage} dari ${newsTotalPages}`"></span><button class="admin-button admin-button--secondary btn-secondary" @click="newsPage=Math.min(newsTotalPages,newsPage+1)">Berikutnya</button></div>
        </section></template>
    </div>
</div>
</div>
