<style>
    .dashboard-header {
        padding: var(--spacing-lg);
        background-color: #fff;
        border-bottom: 1px solid #dee2e6;
    }

    .dashboard-header .page-title,
    .dashboard-header p {
        margin: 0;
    }

    .dashboard-header p {
        margin-top: var(--spacing-xs);
        color: #6c757d;
    }

    .kpi-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: var(--spacing-md);
    }

    .kpi-card {
        background-color: #fff;
        border-radius: 10px;
        padding: var(--spacing-md);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        border: 1px solid rgba(0,0,0,0.08);
    }

    .kpi-card .label {
        font-size: 0.9rem;
        color: #666;
        font-weight: 600;
        margin-bottom: var(--spacing-xs);
    }

    .kpi-card .value {
        font-size: 2rem;
        font-weight: 700;
        color: var(--dark);
    }

    .chart-container {
        background-color: #fff;
        border-radius: 10px;
        padding: var(--spacing-md);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        border: 1px solid rgba(0,0,0,0.08);
    }

    .filter-controls {
        display: flex;
        gap: var(--spacing-sm);
        flex-wrap: wrap;
    }

    .filter-select {
        padding: 0.5rem 0.75rem;
        border-radius: 8px;
        border: 1px solid #ccc;
        background-color: #f8f9fa;
    }

    .modern-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: var(--spacing-md);
    }

    .modern-table th,
    .modern-table td {
        padding: 12px 15px;
        text-align: left;
        border-bottom: 1px solid #eee;
    }

    .modern-table th {
        background-color: #f8f9fa;
        font-weight: 600;
    }

    .modern-table tbody tr:hover { background-color: #f1f3f5; }

    .charts-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: var(--spacing-md);
    }

    .chart-header-controls {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: var(--spacing-sm);
        margin-bottom: var(--spacing-md);
    }

    .chart-title-nav {
        display: flex;
        align-items: center;
        gap: var(--spacing-sm);
    }

    .chart-title-nav h4,
    .chart-container h3 {
        margin: 0;
    }

    .nav-buttons button {
        border: 1px solid #ccc;
        background-color: #f0f0f0;
        border-radius: 8px;
        cursor: pointer;
        padding: 0.3rem 0.7rem;
        font-size: 1rem;
    }

    #chart-date-range {
        font-size: 1.1rem;
        font-weight: 600;
    }

    .chart-canvas-wrapper { position: relative; }
    .chart-canvas-wrapper.limit-chart-width { max-width: 350px; margin-left: auto; margin-right: auto; }
</style>
<div class="container content-wrapper">
    <div class="dashboard-header section">
        <h1 class="page-title section-title" x-text="$store.i18n.t('admin.dashboard.title')">Analytics Dashboard</h1>
        <p x-text="$store.i18n.t('admin.dashboard.description')">Analyze sales trends and product performance.</p>
    </div>

    <div id="kpi-grid" class="kpi-grid section card-container">
        <div class="kpi-card card"><div class="label" x-text="$store.i18n.t('admin.dashboard.kpi.totalRevenue')">Total Revenue</div><div class="value" id="total-revenue">Loading...</div></div>
        <div class="kpi-card card"><div class="label" x-text="$store.i18n.t('admin.dashboard.kpi.completedOrders')">Completed Orders</div><div class="value" id="total-orders">Loading...</div></div>
        <div class="kpi-card card"><div class="label" x-text="$store.i18n.t('admin.dashboard.kpi.bestSelling')">Best Selling Product</div><div class="value" id="best-selling-product">Loading...</div></div>
    </div>

    <div class="charts-grid section">
        <div class="chart-container card">
            <h3 class="section-title" x-text="$store.i18n.t('admin.dashboard.revenueTrend.title')">Revenue Trend</h3>
            <div class="chart-header-controls">
                <div class="chart-title-nav">
                    <div class="nav-buttons"><button id="prev-period">&lt;</button><button id="next-period">&gt;</button></div>
                    <h4 id="chart-date-range">Loading...</h4>
                </div>
                <div class="filter-controls">
                    <select id="revenue-period-filter" class="filter-select">
                        <option value="daily" x-text="$store.i18n.t('admin.dashboard.revenueTrend.daily')">Daily</option>
                        <option value="weekly" x-text="$store.i18n.t('admin.dashboard.revenueTrend.weekly')">Weekly</option>
                        <option value="monthly" x-text="$store.i18n.t('admin.dashboard.revenueTrend.monthly')">Monthly</option>
                    </select>
                </div>
            </div>
            <canvas id="salesTrendChart"></canvas>
        </div>

        <div class="chart-container card" id="product-sales-chart-container">
            <div class="chart-header-controls">
                <h3 x-text="$store.i18n.t('admin.dashboard.productSales.title')">Sales by Product</h3>
                <div class="filter-controls">
                    <select id="product-chart-type" class="filter-select"><option value="bar">Bar Chart</option><option value="pie">Pie Chart</option></select>
                    <select id="product-period-filter" class="filter-select"><option value="total">Total Sales</option><option value="monthly">By Month</option></select>
                    <select id="product-month-filter" class="filter-select" style="display:none;"></select>
                </div>
            </div>
            <div class="chart-canvas-wrapper"><canvas id="productSalesChart"></canvas></div>
        </div>
    </div>

    <div class="chart-container section card">
        <h3 class="section-title" x-text="$store.i18n.t('admin.dashboard.transactions.title')">Recent Transactions</h3>
        <table class="modern-table"><thead><tr><th>Order ID</th><th>Date</th><th>Customer</th><th>Total</th><th>Status</th></tr></thead><tbody id="recent-transactions-body"></tbody></table>
        <p id="loading-transactions" style="display:none;">Loading transactions...</p>
    </div>
</div>
