<style>
    .dashboard-header { padding: 1.5rem; background-color: white; border-bottom: 1px solid #dee2e6; margin-bottom: 2rem; }
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
    .kpi-card { background-color: #fff; border-radius: 12px; padding: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.06); border: 1px solid rgba(0,0,0,0.08); }
    .kpi-card .label { font-size: 0.9rem; color: #666; font-weight: 600; margin-bottom: 0.5rem; }
    .kpi-card .value { font-size: 2rem; font-weight: 700; color: var(--dark); }
    .chart-container { background-color: #fff; border-radius: 12px; padding: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.06); border: 1px solid rgba(0,0,0,0.08); margin-bottom: 1.5rem; }
    .filter-controls { display: flex; gap: 0.5rem; }
    .modern-table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    .modern-table th, .modern-table td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee; }
    .modern-table th { background-color: #f8f9fa; font-weight: 600; }
    .modern-table tbody tr:hover { background-color: #f1f3f5; }
    .charts-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
    .charts-grid .chart-container { margin-bottom: 0; }
    .chart-header-controls { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 1rem; }
    .chart-title-nav { display: flex; align-items: center; gap: 1rem; }
    .nav-buttons button { border: 1px solid #ccc; background-color: #f0f0f0; border-radius: 8px; cursor: pointer; padding: 0.3rem 0.7rem; font-size: 1rem; }
    #chart-date-range { font-size: 1.1rem; font-weight: 600; margin: 0; }
    .chart-canvas-wrapper { position: relative; }
    .chart-canvas-wrapper.limit-chart-width { max-width: 350px; margin-left: auto; margin-right: auto; }
    @media (max-width: 992px) { .charts-grid { grid-template-columns: 1fr; } .charts-grid .chart-container { margin-bottom: 1.5rem; } }
</style>
<div class="container">
    <div class="dashboard-header">
        <h1 class="page-title" x-text="$store.i18n.t('admin.dashboard.title')">Analytics Dashboard</h1>
        <p x-text="$store.i18n.t('admin.dashboard.description')">Analyze sales trends and product performance.</p>
    </div>

    <div id="kpi-grid" class="kpi-grid">
        <div class="kpi-card"><div class="label" x-text="$store.i18n.t('admin.dashboard.kpi.totalRevenue')">Total Revenue</div><div class="value" id="total-revenue">Loading...</div></div>
        <div class="kpi-card"><div class="label" x-text="$store.i18n.t('admin.dashboard.kpi.completedOrders')">Completed Orders</div><div class="value" id="total-orders">Loading...</div></div>
        <div class="kpi-card"><div class="label" x-text="$store.i18n.t('admin.dashboard.kpi.bestSelling')">Best Selling Product</div><div class="value" id="best-selling-product">Loading...</div></div>
    </div>

    <div class="charts-grid">
        <div class="chart-container">
            <h3 x-text="$store.i18n.t('admin.dashboard.revenueTrend.title')">Revenue Trend</h3>
            <div class="chart-header-controls">
                <div class="chart-title-nav">
                    <div class="nav-buttons"><button id="prev-period">&lt;</button><button id="next-period">&gt;</button></div>
                    <h4 id="chart-date-range">Loading...</h4>
                </div>
                <div class="filter-controls">
                    <select id="revenue-period-filter" class="filter-select" style="padding:0.5rem;border-radius:8px;border:1px solid #ccc;">
                        <option value="daily" x-text="$store.i18n.t('admin.dashboard.revenueTrend.daily')">Daily</option>
                        <option value="weekly" x-text="$store.i18n.t('admin.dashboard.revenueTrend.weekly')">Weekly</option>
                        <option value="monthly" x-text="$store.i18n.t('admin.dashboard.revenueTrend.monthly')">Monthly</option>
                    </select>
                </div>
            </div>
            <canvas id="salesTrendChart"></canvas>
        </div>

        <div class="chart-container" id="product-sales-chart-container">
            <div class="chart-header-controls">
                <h3 x-text="$store.i18n.t('admin.dashboard.productSales.title')">Sales by Product</h3>
                <div class="filter-controls">
                    <select id="product-chart-type" class="filter-select" style="padding:0.5rem;border-radius:8px;border:1px solid #ccc;"><option value="bar">Bar Chart</option><option value="pie">Pie Chart</option></select>
                    <select id="product-period-filter" class="filter-select" style="padding:0.5rem;border-radius:8px;border:1px solid #ccc;"><option value="total">Total Sales</option><option value="monthly">By Month</option></select>
                    <select id="product-month-filter" class="filter-select" style="display:none;padding:0.5rem;border-radius:8px;border:1px solid #ccc;"></select>
                </div>
            </div>
            <div class="chart-canvas-wrapper"><canvas id="productSalesChart"></canvas></div>
        </div>
    </div>

    <div class="chart-container">
        <h3 x-text="$store.i18n.t('admin.dashboard.transactions.title')">Recent Transactions</h3>
        <table class="modern-table"><thead><tr><th>Order ID</th><th>Date</th><th>Customer</th><th>Total</th><th>Status</th></tr></thead><tbody id="recent-transactions-body"></tbody></table>
        <p id="loading-transactions" style="display:none;">Loading transactions...</p>
    </div>
</div>
