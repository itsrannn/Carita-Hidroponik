<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Login Page | Carita Hidroponik</title>
    <link rel="icon" type="image/x-icon" href="img/Logo.jpg" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/login-page.css" />
    <link rel="stylesheet" href="css/mobile.css" media="(max-width: 768px)" />

    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Open+Sans:wght@300;400;600&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <script src="js/supabase-client.js"></script>
  </head>

  <body x-data @alpine:init="$store.i18n.init()">
    <div id="header-include"></div>

    <section class="login">
      <div class="container">
        <section>
          <div class="login-form active" id="login-form">
            <form>
              <input type="hidden" name="login" value="1" />
              <h1 x-text="$store.i18n.t('login.loginTitle')">Login</h1>
              <div class="input-box">
                <input type="email" name="email" :placeholder="$store.i18n.t('login.emailPlaceholder')" required />
                <i data-feather="mail"></i>
              </div>

              <div class="input-box">
                <input
                  type="password"
                  name="password"
                  :placeholder="$store.i18n.t('login.passwordPlaceholder')"
                  required
                />
                <i data-feather="lock"></i>
                <i class="password-toggle-icon" data-feather="eye"></i>
              </div>
              <div id="login-error-message" class="auth-error-message" aria-live="polite"></div>
              <div class="remember-forgot">
                <label><input type="checkbox" /><span x-text="$store.i18n.t('login.rememberMe')">Remember me</span></label>
                <a href="#" x-text="$store.i18n.t('login.forgotPassword')">Forgot Password?</a>
              </div>
              <div class="btn-wrapper">
                <button type="submit" class="btn" x-text="$store.i18n.t('login.loginButton')">Login</button>
              </div>
              <div class="oauth-divider" aria-label="Alternative login option">
                <span>OR</span>
              </div>
              <button type="button" id="google-login-button" class="google-login-btn">
                <svg class="google-login-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                  <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C4 20.53 7.7 23 12 23z"/>
                  <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
                  <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 4 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                <span>Continue with Google</span>
              </button>
              <div class="register-link">
                <p>
                  <span x-text="$store.i18n.t('login.noAccount')">Don't have an account?</span>
                  <a href="#" onclick="showForm('register-form')" x-text="$store.i18n.t('login.registerLink')">Register</a>
                </p>
              </div>
            </form>
          </div>
          <div id="verification-message" style="text-align: center; color: var(--text-color); display: none;">
            <h2 x-text="$store.i18n.t('login.verification.title')">Registration Successful!</h2>
            <p x-text="$store.i18n.t('login.verification.message')">We have sent a verification link to your email. Please check your inbox to complete the registration.</p>
          </div>
        </section>
        <section>
          <div class="login-form" id="register-form">
            <form>
              <input type="hidden" name="register" value="1" />
              <h1 x-text="$store.i18n.t('login.registerTitle')">Register</h1>

              <div class="input-box">
                <input type="text" name="name" :placeholder="$store.i18n.t('login.namePlaceholder')" required />
                <i data-feather="user"></i>
              </div>

              <div class="input-box">
                <input type="email" name="email" :placeholder="$store.i18n.t('login.emailPlaceholder')" required />
                <i data-feather="mail"></i>
              </div>
              <span id="email-domain-error" class="error-message" style="display: block; color: red; text-align: left; width: 100%; padding: 0 5px; font-size: 0.8rem; margin-top: -10px; margin-bottom: 10px; visibility: hidden;"></span>

              <div class="input-box">
                <input
                  type="password"
                  name="password"
                  :placeholder="$store.i18n.t('login.passwordPlaceholder')"
                  required
                />
                <i data-feather="lock"></i>
                <i class="password-toggle-icon" data-feather="eye"></i>
              </div>

              <div class="remember-forgot">
                <label><input type="checkbox" /> <span x-text="$store.i18n.t('login.rememberMe')">Remember me</span></label>
              </div>

              <div class="btn-wrapper">
                <button type="submit" class="btn" x-text="$store.i18n.t('login.registerLink')">Register</button>
              </div>

              <div class="register-link">
                <p>
                  <span x-text="$store.i18n.t('login.alreadyAccount')">Already have an account?</span>
                  <a href="#" onclick="showForm('login-form')" x-text="$store.i18n.t('login.loginLink')">Login</a>
                </p>
              </div>
            </form>
          </div>
        </section>
      </div>
    </section>

    <div id="auth-success-modal" class="auth-modal-overlay" aria-hidden="true">
      <div class="auth-modal-card" role="dialog" aria-modal="true" aria-labelledby="auth-success-title">
        <p id="auth-success-title">Akun berhasil dibuat</p>
        <button type="button" id="auth-success-ok" class="btn">OK</button>
      </div>
    </div>

    <div id="footer-include"></div>
    <div id="notification" class="notification" role="status" aria-live="polite"></div>


    <style>
      .auth-error-message {
        min-height: 18px;
        margin: -4px 4px 10px;
        font-size: 0.8rem;
        color: #dc6f6f;
        text-align: left;
        visibility: hidden;
      }
      .auth-error-message.show { visibility: visible; }
      .auth-modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1200;
        padding: 16px;
      }
      .auth-modal-overlay.show { display: flex; }
      .auth-modal-card {
        background: #fff;
        border-radius: 10px;
        width: min(92vw, 340px);
        padding: 24px 20px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      }
      .auth-modal-card p { margin-bottom: 16px; color: var(--text-color); font-weight: 600; }
    </style>

    <script src="https://unpkg.com/feather-icons"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.10/dist/cdn.min.js" defer ></script>

    <script src="js/main.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", () => window.safeFeatherReplace && window.safeFeatherReplace());
    </script>
    <script>
      function showForm(formIdToShow) {
        document.querySelectorAll(".login-form").forEach((form) => {
          form.classList.remove("active");
        });

        const targetForm = document.getElementById(formIdToShow);
        if (targetForm) {
          targetForm.classList.add("active");
        }
      }
    </script>

    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const loginForm = document.querySelector('#login-form form');
        const registerForm = document.querySelector('#register-form form');
        const loginErrorMessage = document.getElementById('login-error-message');
        const authSuccessModal = document.getElementById('auth-success-modal');
        const authSuccessOkBtn = document.getElementById('auth-success-ok');
        const googleLoginButton = document.getElementById('google-login-button');

        const hideLoginError = () => {
          loginErrorMessage.textContent = '';
          loginErrorMessage.classList.remove('show');
        };

        const showLoginError = (message) => {
          loginErrorMessage.textContent = message;
          loginErrorMessage.classList.add('show');
        };

        const showRegisterSuccessModal = () => {
          authSuccessModal.classList.add('show');
          authSuccessModal.setAttribute('aria-hidden', 'false');
        };

        const hideRegisterSuccessModal = () => {
          authSuccessModal.classList.remove('show');
          authSuccessModal.setAttribute('aria-hidden', 'true');
        };

        loginForm.email.addEventListener('input', hideLoginError);
        loginForm.password.addEventListener('input', hideLoginError);

        const showAuthMessage = (message, isError = true) => {
          showLoginError(message);
          if (window.showSiteNotification) {
            window.showSiteNotification(message, isError);
          }
        };

        // --- Role-based redirection logic ---
        const handleRedirect = async (user) => {
          // Attempt to fetch the user's role.
          const { data: profile } = await supabase
            .from('profiles')
            .select('role')
            .eq('id', user.id)
            .single();

          // Secure default: if profile doesn't load or role is not admin,
          // redirect to the customer account page.
          if (profile && profile.role && profile.role.toLowerCase() === 'admin') {
            window.location.href = 'admin.html';
          } else {
            window.location.href = 'my-account.html';
          }
        };

        // --- Google OAuth Login Handler ---
        googleLoginButton?.addEventListener('click', async () => {
          hideLoginError();
          googleLoginButton.disabled = true;
          googleLoginButton.classList.add('is-loading');

          try {
            const urlParams = new URLSearchParams(window.location.search);
            const redirectUrl = window.getSafeAppRedirect
              ? window.getSafeAppRedirect(urlParams.get('redirect'))
              : null;

            if (redirectUrl) {
              sessionStorage.setItem('carita.oauth.redirect', redirectUrl);
            } else {
              sessionStorage.removeItem('carita.oauth.redirect');
            }

            const { error } = await supabase.auth.signInWithOAuth({
              provider: 'google',
              options: {
                redirectTo: 'https://itsrannn.github.io/Carita-Hidroponik/'
              }
            });

            if (error) {
              throw error;
            }
          } catch (error) {
            console.error('[Auth] Google OAuth failed:', error);
            googleLoginButton.disabled = false;
            googleLoginButton.classList.remove('is-loading');
            showAuthMessage(error?.message || 'Login Google gagal. Silakan coba lagi.');
          }
        });

        // --- Login Form Handler ---
        loginForm.addEventListener('submit', async (event) => {
          event.preventDefault();
          const email = loginForm.email.value;
          const password = loginForm.password.value;

          const { data, error } = await supabase.auth.signInWithPassword({
            email,
            password,
          });

          if (error) {
            let errorMessage = 'Password yang dimasukkan salah.';

            if (error.message && error.message.toLowerCase().includes('invalid login credentials')) {
              const { data: profileByEmail, error: profileLookupError } = await supabase
                .from('profiles')
                .select('id')
                .eq('email', email)
                .limit(1);

              if (!profileLookupError && (!profileByEmail || profileByEmail.length === 0)) {
                errorMessage = 'Email belum terdaftar.';
              }
            }

            showLoginError(errorMessage);
          } else if (data.user) {
            hideLoginError();
            const urlParams = new URLSearchParams(window.location.search);
            const redirectUrl = urlParams.get('redirect');

            const safeRedirectUrl = window.getSafeAppRedirect
              ? window.getSafeAppRedirect(redirectUrl)
              : redirectUrl;

            if (safeRedirectUrl) {
              window.location.href = safeRedirectUrl;
            } else {
              await handleRedirect(data.user);
            }
          }
        });

        // --- Registration Form Handler ---
        registerForm.addEventListener('submit', async (event) => {
          event.preventDefault();
          const name = registerForm.name.value;
          const email = registerForm.email.value;
          const password = registerForm.password.value;
          const errorSpan = document.getElementById('email-domain-error');

          const allowedDomains = [
            '@gmail.com',
            '@yahoo.com',
            '@yahoo.co.id',
            '@outlook.com',
            '@hotmail.com',
            '@icloud.com'
          ];

          const emailDomain = email.substring(email.lastIndexOf('@'));

          if (!allowedDomains.includes(emailDomain)) {
            errorSpan.textContent = "Gunakan email dengan domain umum seperti Gmail, Yahoo, atau Outlook.";
            errorSpan.style.visibility = 'visible';
            return;
          } else {
            errorSpan.style.visibility = 'hidden';
          }

          const { data, error } = await supabase.auth.signUp({
            email,
            password,
            options: {
              data: { full_name: name }
            }
          });

          if (error) {
            errorSpan.textContent = 'Pendaftaran gagal. Coba lagi dengan data yang valid.';
            errorSpan.style.visibility = 'visible';
          } else {
            errorSpan.style.visibility = 'hidden';
            showRegisterSuccessModal();

            const handleSuccessContinue = () => {
              hideRegisterSuccessModal();
              showForm('login-form');
              loginForm.email.value = email;
              loginForm.password.focus();
              authSuccessOkBtn.removeEventListener('click', handleSuccessContinue);
            };

            authSuccessOkBtn.addEventListener('click', handleSuccessContinue);
          }
        });
      });
    </script>
    <script>
      document.addEventListener("DOMContentLoaded", () => window.safeFeatherReplace && window.safeFeatherReplace());
    </script>

    <script>
      // === Password Toggle Functionality ===
      // Use event delegation to ensure the click handler works even after the icon is replaced by Feather Icons.
      document.addEventListener('click', function (e) {
        const icon = e.target.closest('.password-toggle-icon');
        if (!icon) return;

        const inputBox = icon.closest('.input-box');
        if (!inputBox) return;

        const passwordInput = inputBox.querySelector('input[type="password"], input[type="text"]');
        if (!passwordInput) return;

        // Toggle input type
        const isPassword = passwordInput.type === 'password';
        passwordInput.type = isPassword ? 'text' : 'password';

        // Create a new <i> element to replace the old <svg> icon
        const newIcon = document.createElement('i');
        newIcon.className = 'password-toggle-icon';
        newIcon.setAttribute('data-feather', isPassword ? 'eye-off' : 'eye');

        // Replace the old icon with the new one
        icon.replaceWith(newIcon);

        // Tell Feather Icons to process the new icon
        window.safeFeatherReplace && window.safeFeatherReplace();
      });
    </script>
  </body>
</html>
