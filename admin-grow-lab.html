<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Admin Grow Lab | Carita Hidroponik</title><link rel="stylesheet" href="css/style.css"/><link rel="stylesheet" href="css/my-grow-lab.css"/></head><body x-data="adminGrowLab" x-init="init()"><div id="header-include"></div><main class="container grow-lab-page"><section class="glass"><h1>Admin Grow Lab Management</h1><p>Kelola template timeline, secret content, dan durasi panen produk.</p></section><section class="glass"><h2>Timeline Template</h2><textarea x-model="timelineJson" rows="10" style="width:100%"></textarea><button @click="saveTimelines">Save</button></section><section class="glass"><h2>Secret Contents</h2><textarea x-model="secretJson" rows="10" style="width:100%"></textarea><button @click="saveSecrets">Save</button></section></main><div id="footer-include"></div><script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script><script src="https://unpkg.com/@supabase/supabase-js@2"></script><script src="js/supabase-client.js"></script><script src="js/main.js"></script><script>document.addEventListener('alpine:init',()=>{Alpine.data('adminGrowLab',()=>({timelineJson:'[]',secretJson:'[]',async init(){const {data}=await window.supabase.auth.getUser();if(!data?.user){location.href=window.toAppPath('login-page.html');}},async saveTimelines(){alert('Gunakan SQL editor/admin API untuk update grow_timelines. Placeholder UI siap dipakai.');},async saveSecrets(){alert('Gunakan SQL editor/admin API untuk update grow_secret_contents. Placeholder UI siap dipakai.');}}));});</script></body></html>
