<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Editor | Carita Hidroponik</title>
    <link rel="icon" type="image/x-icon" href="img/Logo.jpg" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/mobile.css" media="(max-width: 768px)" />
    <style>
        body { background-color: #f8f9fa; }
        .editor-header { padding: 1.5rem; background-color: white; border-bottom: 1px solid #dee2e6; margin-bottom: 2rem; border-radius: 12px; }
        .editor-header h1 { margin: 0; }
        .back-link { display: block; margin-bottom: 1rem; color: var(--primary); text-decoration: none; font-weight: 600; }
        .content-card { background-color: #fff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.06); border: 1px solid rgba(0,0,0,0.08); padding: 2rem; }
        .form-footer { padding-top: 1.5rem; border-top: 1px solid #dee2e6; display: flex; justify-content: flex-end; gap: 1rem; margin-top: 1.5rem; }
        .btn-cancel { border: 1px solid #ccc; background-color: #fff; color: #333; padding: 0.7rem 1.2rem; border-radius: 8px; font-weight: 600; cursor: pointer; text-decoration: none; }
        .btn-submit { background-color: #15803d; color: white; border: none; padding: 0.7rem 1.2rem; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 1.5rem; }
        @media (min-width: 768px) { .form-grid { grid-template-columns: repeat(2, 1fr); } .grid-col-span-2 { grid-column: span 2; } }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-weight: 600; margin-bottom: 0.5rem; color: #333; }
        .form-group input, .form-group select, .form-group textarea { padding: 0.75rem; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; }
        .form-group textarea { min-height: 140px; resize: vertical; }
        .related-news-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 0.6rem 1rem; max-height: 260px; overflow: auto; border: 1px solid #e5e7eb; border-radius: 10px; padding: 0.8rem; background: #fafafa; }
        .related-news-item { display: flex; align-items: flex-start; gap: 0.5rem; font-size: 0.9rem; line-height: 1.4; }
    </style>
</head>
<body x-data="editorPage" x-init="init(); $store.i18n.init()">
    <div id="header-include"></div>
    <main class="main-content">
        <div class="container">
            <div class="editor-header">
                <a href="admin-products.html" class="back-link">&larr; Back to Content Management</a>
                <h1 x-text="title">Loading...</h1>
            </div>
            <div class="content-card">
                <template x-if="isError"><div class="text-center" style="padding: 2rem;"><p>Data tidak ditemukan atau gagal dimuat.</p><a href="admin-products.html" class="btn-submit" style="text-decoration: none;">Kembali</a></div></template>
                <p x-show="isLoading && !isError">Loading...</p>
                <form id="editor-form" @submit.prevent="submitForm" x-show="!isError && !isLoading">
                    <div class="form-grid" x-show="type === 'product'">
                        <div class="form-group"><label for="product-name_en">Nama Produk (English)</label><input id="product-name_en" type="text" x-model="item.name_en"></div>
                        <div class="form-group"><label for="product-name_id">Nama Produk (Indonesia) *</label><input id="product-name_id" type="text" x-model="item.name_id"></div>
                        <div class="form-group"><label for="product-category">Kategori</label><select id="product-category" x-model="item.category"><option value="">Pilih Kategori</option><option value="benih">Benih</option><option value="nutrisi">Nutrisi</option><option value="media">Media Tanam</option><option value="peralatan">Peralatan</option><option value="promo">Promo</option></select></div>
                        <div class="form-group"><label for="product-price">Harga (IDR) *</label><input id="product-price" type="number" min="0" x-model.number="item.price"></div>
                        <div class="form-group"><label for="product-stock">Stok *</label><input id="product-stock" type="number" min="0" x-model.number="item.stock"></div>
                        <div class="form-group"><label for="product-image_url">Image URL</label><input id="product-image_url" type="text" x-model="item.image_url" @input="imagePreviewUrl = item.image_url"><img :src="imagePreviewUrl" x-show="imagePreviewUrl" alt="Preview" style="max-width: 200px; margin-top: 1rem; border-radius: 8px;"></div>
                        <div class="form-group"><label>Diskon</label><select x-model="discount_type"><option value="percent">Persen</option><option value="price">Harga Diskon</option></select><input type="number" min="0" x-model.number="discount_value" placeholder="Nilai diskon" style="margin-top:.5rem;"></div>
                        <div class="form-group grid-col-span-2"><label>Karakteristik (EN)</label><textarea x-model="item.char_en"></textarea></div>
                        <div class="form-group grid-col-span-2"><label>Karakteristik (ID)</label><textarea x-model="item.char_id"></textarea></div>
                        <div class="form-group grid-col-span-2"><label>Deskripsi (EN)</label><textarea x-model="item.description_en"></textarea></div>
                        <div class="form-group grid-col-span-2"><label>Deskripsi (ID)</label><textarea x-model="item.description_id"></textarea></div>
                        <div class="form-group grid-col-span-2"><label>Related News</label><div class="related-news-grid"><template x-if="allNews.length === 0"><p>Belum ada berita.</p></template><template x-for="news in allNews" :key="news.id"><label class="related-news-item"><input type="checkbox" :value="news.id" x-model="relatedNewsIds"><span x-text="(news.title && (news.title[$store.i18n.lang] || news.title.id || news.title.en)) || 'Untitled News'"></span></label></template></div></div>
                    </div>
                    <div class="form-grid" x-show="type === 'news'">
                        <div class="form-group"><label for="news-title_en">Judul (English)</label><input id="news-title_en" type="text" x-model="item.title_en"></div>
                        <div class="form-group"><label for="news-title_id">Judul (Indonesia) *</label><input id="news-title_id" type="text" x-model="item.title_id"></div>
                        <div class="form-group grid-col-span-2"><label for="news-image_url">Image URL</label><input id="news-image_url" type="text" x-model="item.image_url" @input="imagePreviewUrl = item.image_url"><img :src="imagePreviewUrl" x-show="imagePreviewUrl" alt="Preview" style="max-width: 200px; margin-top: 1rem; border-radius: 8px;"></div>
                        <div class="form-group"><label>Excerpt (EN)</label><textarea x-model="item.excerpt_en"></textarea></div>
                        <div class="form-group"><label>Excerpt (ID)</label><textarea x-model="item.excerpt_id"></textarea></div>
                        <div class="form-group grid-col-span-2"><label>Konten (EN)</label><textarea x-model="item.body_en"></textarea></div>
                        <div class="form-group grid-col-span-2"><label>Konten (ID) *</label><textarea x-model="item.body_id"></textarea></div>
                        <div class="form-group grid-col-span-2"><label>Related Products</label><div class="related-news-grid"><template x-if="allProducts.length === 0"><p>Belum ada produk.</p></template><template x-for="product in allProducts" :key="product.id"><label class="related-news-item"><input type="checkbox" :value="product.id" x-model="relatedProductIds"><span x-text="(product.name && (product.name[$store.i18n.lang] || product.name.id || product.name.en)) || 'Untitled Product'"></span></label></template></div></div>
                    </div>
                    <div class="form-footer"><a href="admin-products.html" class="btn-cancel">Cancel</a><button type="submit" class="btn-submit" x-text="submitButtonText">Save</button></div>
                </form>
            </div>
        </div>
    </main>
    <div id="footer-include"></div>
    <script src="https://unpkg.com/feather-icons"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.10/dist/cdn.min.js?nounit=true" defer></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/admin-auth.js"></script>
    <script src="js/main.js"></script>
    <script src="js/admin-product-editor.js"></script>
</body>
</html>
