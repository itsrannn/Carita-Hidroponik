<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Center | Carita Hidroponik</title>
    <link rel="icon" type="image/x-icon" href="img/Logo.jpg" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/mobile.css" media="(max-width: 768px)" />
    <style>
        :root {
            --sidebar-bg: #1b5e20;
            --sidebar-bg-alt: #245f2f;
            --sidebar-text: #e8f5e9;
            --sidebar-muted: #c9dfcc;
            --sidebar-active-bg: #2e7d32;
            --content-bg: #f5f7fa;
            --card-bg: #ffffff;
            --card-shadow: 0 8px 24px rgba(15, 23, 42, 0.07);
            --card-border: #e6ebf2;
            --headline: #111827;
            --subtle: #6b7280;
            --spacing-xs: 8px;
            --spacing-sm: 12px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        body {
            margin: 0;
            overflow: hidden;
            color: var(--headline);
            font-family: "Inter", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: var(--content-bg);
        }

        .dashboard {
            min-height: 100vh;
            background: var(--content-bg);
        }

        .sidebar {
            width: 20vw;
            min-width: 220px;
            max-width: 280px;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            background: linear-gradient(180deg, var(--sidebar-bg) 0%, var(--sidebar-bg-alt) 100%);
            color: var(--sidebar-text);
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 20;
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 4px 4px 18px;
            border-bottom: 1px solid rgba(232, 245, 233, 0.2);
        }

        .sidebar-brand img {
            width: 38px;
            height: 38px;
            object-fit: cover;
        }

        .sidebar-brand strong {
            display: block;
            font-size: 1rem;
            color: #ffffff;
            font-weight: 700;
        }

        .sidebar-brand span {
            display: block;
            font-size: 0.82rem;
            color: var(--sidebar-muted);
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 10px;
            color: var(--sidebar-text);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: background-color 0.2s ease, color 0.2s ease;
            cursor: pointer;
        }

        .sidebar-link:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #ffffff;
        }

        .sidebar-link.active {
            background: var(--sidebar-active-bg);
            color: #ffffff;
        }

        .main-content {
            margin-left: clamp(220px, 20vw, 280px);
            height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            padding: var(--spacing-lg) var(--spacing-xl);
            background: var(--content-bg);
        }

        .content-wrapper {
            max-width: 1200px;
            margin: 0 auto;
        }

        .section {
            margin-bottom: var(--spacing-lg);
        }

        .section-title {
            margin: 0 0 var(--spacing-md);
        }

        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-md);
        }

        .card-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: var(--spacing-md);
        }

        .card {
            padding: var(--spacing-md);
            border-radius: 10px;
            background: #fff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
        }

        .card-content {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-xs);
        }

        #content-container {
            min-height: calc(100vh - 56px);
            transition: opacity 0.2s ease;
        }

        #content-container.is-loading {
            opacity: 0.55;
        }

        .loading-indicator {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            box-shadow: var(--card-shadow);
            padding: 16px;
            color: var(--subtle);
        }

        #content-container .container {
            padding: 0;
        }

        #content-container .dashboard-header h1,
        #content-container .dashboard-header .page-title {
            font-size: 1.7rem;
            line-height: 1.25;
            margin: 0;
            font-weight: 700;
            color: #0f172a;
        }

        #content-container .dashboard-header p {
            margin-top: 8px;
            color: var(--subtle);
            font-size: 0.95rem;
        }

        #content-container .kpi-card .value {
            font-size: 1.9rem;
        }

        #content-container .table-header,
        #content-container .chart-header-controls {
            gap: 16px;
            align-items: center;
        }

        @media (max-width: 768px) {
            body {
                overflow: auto;
            }

            .sidebar {
                display: none;
            }

            .main-content {
                margin-left: 0;
                height: auto;
                min-height: 100vh;
                overflow: visible;
                padding: var(--spacing-md);
            }

            #content-container .dashboard-header h1,
            #content-container .dashboard-header .page-title {
                font-size: 1.35rem;
            }
        }
    </style>
</head>
<body x-data x-init="$store.i18n.init()">

    <div id="header-include" style="display: none;"></div>

    <div class="dashboard" id="admin-dashboard-shell">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <img src="img/Logo.jpg" alt="Carita Hidroponik">
                <div>
                    <strong>Carita Admin</strong>
                    <span>Operations Dashboard</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a class="sidebar-link active" data-page="admin-orders" data-source="admin-partials/admin-orders-content.html">
                    <i data-feather="package"></i>
                    <span x-text="$store.i18n.t('admin.hub.orderCard.title')">Order Management</span>
                </a>
                <a class="sidebar-link" data-page="admin-products" data-source="admin-partials/admin-products-content.html">
                    <i data-feather="edit"></i>
                    <span x-text="$store.i18n.t('admin.hub.contentCard.title')">Content Management</span>
                </a>
                <a class="sidebar-link" data-page="admin-dashboard" data-source="admin-partials/admin-dashboard-content.html">
                    <i data-feather="bar-chart-2"></i>
                    <span x-text="$store.i18n.t('admin.hub.analyticsCard.title')">Analytics Dashboard</span>
                </a>
                <a class="sidebar-link" data-page="admin-shipping" data-source="admin-partials/admin-shipping-content.html">
                    <i data-feather="truck"></i>
                    <span>Manajemen Ongkos Kirim</span>
                </a>
            </nav>
        </aside>

        <main class="main-content">
            <div id="content-container"></div>
        </main>
    </div>

    <div id="footer-include" style="display: none;"></div>

    <script src="https://unpkg.com/feather-icons"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.10/dist/cdn.min.js?nounit=true" defer></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/admin-auth.js"></script>
    <script src="js/main.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/admin-dashboard.js"></script>
    <script src="js/admin-shipping.js"></script>
    <script>
        const contentContainer = document.getElementById('content-container');

        function setActiveMenu(activeLink) {
            document.querySelectorAll('.sidebar-link').forEach((link) => {
                link.classList.toggle('active', link === activeLink);
            });
        }

        function initializeLoadedPage(page) {
            if (page === 'admin-orders' && window.AdminOrdersPage) {
                window.AdminOrdersPage.init();
            }

            if (page === 'admin-dashboard' && window.AdminDashboardPage) {
                window.AdminDashboardPage.init();
            }

            if (page === 'admin-shipping' && window.AdminShippingPage) {
                window.AdminShippingPage.init();
            }

            if (window.Alpine) {
                window.Alpine.initTree(contentContainer);
            }

            if (window.feather) {
                feather.replace();
            }
        }

        function loadContent(page, source, activeLink) {
            contentContainer.classList.add('is-loading');
            contentContainer.innerHTML = '<div class="loading-indicator">Loading content...</div>';

            fetch(source)
                .then((response) => {
                    if (!response.ok) {
                        throw new Error('Failed to fetch content');
                    }
                    return response.text();
                })
                .then((html) => {
                    const parsed = new DOMParser().parseFromString(html, 'text/html');
                    const bodyContent = parsed.body ? parsed.body.innerHTML : html;
                    contentContainer.innerHTML = bodyContent;
                    setActiveMenu(activeLink);
                    initializeLoadedPage(page);
                })
                .catch((error) => {
                    contentContainer.innerHTML = '<p>Error loading content</p>';
                    console.error(error);
                })
                .finally(() => {
                    contentContainer.classList.remove('is-loading');
                });
        }

        window.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.sidebar-link').forEach((link) => {
                link.addEventListener('click', () => {
                    loadContent(link.dataset.page, link.dataset.source, link);
                });
            });

            const defaultLink = document.querySelector('.sidebar-link.active') || document.querySelector('.sidebar-link');
            if (defaultLink) {
                loadContent(defaultLink.dataset.page, defaultLink.dataset.source, defaultLink);
            }
        });
    </script>
</body>
</html>
