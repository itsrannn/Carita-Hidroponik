<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Center | Carita Hidroponik</title>
    <link rel="icon" type="image/x-icon" href="img/Logo.jpg" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/mobile.css" media="(max-width: 768px)" />
    <style>
        body {
            margin: 0;
            background: #f5f7fa;
            color: #1f2937;
            font-family: "Inter", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        .dashboard {
            min-height: 100vh;
            display: flex;
            background: #f5f7fa;
        }

        .sidebar {
            width: 260px;
            position: sticky;
            top: 0;
            height: 100vh;
            background: linear-gradient(180deg, #1b5e20 0%, #2e7d32 100%);
            color: #e8f5e9;
            display: flex;
            flex-direction: column;
            padding: 1.25rem 1rem;
            box-shadow: 6px 0 24px rgba(0, 0, 0, 0.15);
            z-index: 20;
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.6rem 0.75rem 1.2rem 0.75rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 1.25rem;
        }

        .sidebar-brand img {
            width: 36px;
            height: 36px;
            object-fit: cover;
        }

        .sidebar-brand strong {
            display: block;
            font-size: 0.95rem;
            color: #ffffff;
        }

        .sidebar-brand span {
            display: block;
            font-size: 0.8rem;
            color: #c8e6c9;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 0.45rem;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: #e8f5e9;
            text-decoration: none;
            padding: 0.75rem 0.8rem;
            font-weight: 500;
            border: 1px solid transparent;
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
            cursor: pointer;
        }

        .sidebar-link:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #ffffff;
        }

        .sidebar-link.active {
            background: #66bb6a;
            border-color: #81c784;
            color: #0b3d0b;
            font-weight: 700;
        }

        .content-shell {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 15;
            background: #ffffff;
            border-bottom: 1px solid #e5e7eb;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .topbar h2 {
            margin: 0;
            font-size: 1rem;
            font-weight: 700;
        }

        .menu-toggle {
            border: 1px solid #d1d5db;
            background: #ffffff;
            color: #111827;
            display: none;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            cursor: pointer;
        }

        .main-content {
            padding: 1.5rem;
            width: 100%;
        }

        #content-container {
            min-height: 360px;
            transition: opacity 0.2s ease;
        }

        #content-container.is-loading {
            opacity: 0.55;
        }

        .loading-indicator {
            background: #fff;
            border: 1px solid #e5e7eb;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        @media (max-width: 900px) {
            .menu-toggle {
                display: inline-flex;
            }

            .sidebar {
                position: fixed;
                left: -270px;
                transition: left 0.25s ease;
            }

            .dashboard.sidebar-open .sidebar {
                left: 0;
            }

            .dashboard.sidebar-open::after {
                content: "";
                position: fixed;
                inset: 0;
                background: rgba(17, 24, 39, 0.35);
                z-index: 10;
            }

            .topbar,
            .main-content {
                padding: 1rem;
            }
        }
    </style>
</head>
<body x-data x-init="$store.i18n.init()">

    <div id="header-include" style="display: none;"></div>

    <div class="dashboard" id="admin-dashboard-shell">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <img src="img/Logo.jpg" alt="Carita Hidroponik">
                <div>
                    <strong>Carita Admin</strong>
                    <span>E-commerce Panel</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a class="sidebar-link active" data-page="admin-dashboard" data-source="admin-partials/admin-dashboard-content.html">
                    <i data-feather="bar-chart-2"></i>
                    <span x-text="$store.i18n.t('admin.hub.analyticsCard.title')">Analytics</span>
                </a>
                <a class="sidebar-link" data-page="admin-orders" data-source="admin-partials/admin-orders-content.html">
                    <i data-feather="package"></i>
                    <span x-text="$store.i18n.t('admin.hub.orderCard.title')">Order Management</span>
                </a>
                <a class="sidebar-link" data-page="admin-products" data-source="admin-partials/admin-products-content.html">
                    <i data-feather="edit"></i>
                    <span x-text="$store.i18n.t('admin.hub.contentCard.title')">Content Management</span>
                </a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <button class="menu-toggle" id="menu-toggle-btn" type="button" aria-label="Toggle navigation">
                    <i data-feather="menu"></i>
                </button>
                <h2 x-text="$store.i18n.t('admin.hub.title')">Admin Center</h2>
            </header>

            <div id="content-container"></div>
        </main>
    </div>

    <div id="footer-include" style="display: none;"></div>

    <script src="https://unpkg.com/feather-icons"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.10/dist/cdn.min.js?nounit=true" defer></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/admin-auth.js"></script>
    <script src="js/main.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/admin-dashboard.js"></script>
    <script>
        const contentContainer = document.getElementById('content-container');
        const dashboardShell = document.getElementById('admin-dashboard-shell');

        function setActiveMenu(activeLink) {
            document.querySelectorAll('.sidebar-link').forEach((link) => {
                link.classList.toggle('active', link === activeLink);
            });
        }

        function initializeLoadedPage(page) {
            if (page === 'admin-orders' && window.AdminOrdersPage) {
                window.AdminOrdersPage.init();
            }

            if (page === 'admin-dashboard' && window.AdminDashboardPage) {
                window.AdminDashboardPage.init();
            }

            if (window.Alpine) {
                window.Alpine.initTree(contentContainer);
            }

            if (window.feather) {
                feather.replace();
            }
        }

        function loadContent(page, source, activeLink) {
            contentContainer.classList.add('is-loading');
            contentContainer.innerHTML = '<div class="loading-indicator">Loading content...</div>';

            fetch(source)
                .then((response) => {
                    if (!response.ok) {
                        throw new Error('Failed to fetch content');
                    }
                    return response.text();
                })
                .then((html) => {
                    const parsed = new DOMParser().parseFromString(html, 'text/html');
                    const bodyContent = parsed.body ? parsed.body.innerHTML : html;
                    contentContainer.innerHTML = bodyContent;
                    setActiveMenu(activeLink);
                    initializeLoadedPage(page);
                })
                .catch((error) => {
                    contentContainer.innerHTML = '<p>Error loading content</p>';
                    console.error(error);
                })
                .finally(() => {
                    contentContainer.classList.remove('is-loading');
                    dashboardShell.classList.remove('sidebar-open');
                });
        }

        window.addEventListener('DOMContentLoaded', () => {
            const toggleButton = document.getElementById('menu-toggle-btn');
            if (toggleButton) {
                toggleButton.addEventListener('click', () => {
                    dashboardShell.classList.toggle('sidebar-open');
                });
            }

            document.querySelectorAll('.sidebar-link').forEach((link) => {
                link.addEventListener('click', () => {
                    loadContent(link.dataset.page, link.dataset.source, link);
                });
            });

            const defaultLink = document.querySelector('.sidebar-link.active') || document.querySelector('.sidebar-link');
            if (defaultLink) {
                loadContent(defaultLink.dataset.page, defaultLink.dataset.source, defaultLink);
            }
        });
    </script>
</body>
</html>
