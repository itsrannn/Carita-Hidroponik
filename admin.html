<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Center | Carita Hidroponik</title>
    <link rel="icon" type="image/x-icon" href="img/Logo.jpg" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/mobile.css" media="(max-width: 768px)" />
    <link rel="stylesheet" href="css/admin.css" />
</head>
<body class="admin-body" x-data x-init="$store.i18n.init()">

    <div id="header-include" hidden></div>

    <div class="admin-shell" id="admin-dashboard-shell">
        <button class="admin-sidebar-overlay" id="admin-sidebar-overlay" type="button" aria-label="Close admin navigation"></button>
        <aside class="admin-sidebar" id="admin-sidebar" aria-label="Admin navigation">
            <div class="sidebar-brand">
                <img src="img/Logo.jpg" alt="Carita Hidroponik">
                <div class="brand-copy">
                    <strong>Carita Admin</strong>
                    <span>CMS Dashboard</span>
                </div>
                <button class="sidebar-toggle" type="button" id="sidebar-toggle" aria-label="Collapse sidebar" aria-expanded="true"><i data-feather="sidebar"></i></button>
                <button class="sidebar-close" type="button" id="sidebar-close" aria-label="Close admin navigation"><i data-feather="x"></i></button>
            </div>
            <nav class="sidebar-nav">
                <a href="#dashboard" class="sidebar-link active" data-route="dashboard" data-page="admin-dashboard" data-source="admin-partials/admin-dashboard-content.html" data-title="Dashboard"><i data-feather="home"></i><span class="sidebar-label">Dashboard</span></a>
                <a href="#products" class="sidebar-link" data-route="products" data-page="admin-products" data-source="admin-partials/admin-products-content.html" data-title="Products" data-tab="products"><i data-feather="shopping-bag"></i><span class="sidebar-label">Products</span></a>
                <a href="#orders" class="sidebar-link" data-route="orders" data-page="admin-orders" data-source="admin-partials/admin-orders-content.html" data-title="Orders"><i data-feather="package"></i><span class="sidebar-label">Orders</span></a>
                <a href="#news" class="sidebar-link" data-route="news" data-page="admin-products" data-source="admin-partials/admin-products-content.html" data-title="News" data-tab="news"><i data-feather="file-text"></i><span class="sidebar-label">News</span></a>
                <a href="#analytics" class="sidebar-link" data-route="analytics" data-page="admin-analytics" data-title="Analytics"><i data-feather="bar-chart-2"></i><span class="sidebar-label">Analytics</span></a>
                <a href="#shipping" class="sidebar-link" data-route="shipping" data-page="admin-shipping" data-source="admin-partials/admin-shipping-content.html" data-title="Shipping"><i data-feather="truck"></i><span class="sidebar-label">Shipping</span></a>
                <a href="#settings" class="sidebar-link" data-route="settings" data-page="admin-settings" data-title="Settings"><i data-feather="settings"></i><span class="sidebar-label">Settings</span></a>
                <a class="sidebar-link logout" href="#" id="admin-logout-link"><i data-feather="log-out"></i><span class="sidebar-label">Logout</span></a>
            </nav>
        </aside>

        <main class="admin-main">
            <header class="admin-topbar">
                <div class="topbar-left">
                    <button class="admin-menu-button" type="button" id="admin-menu-button" aria-label="Open admin navigation" aria-controls="admin-sidebar" aria-expanded="false"><i data-feather="menu"></i></button>
                    <div>
                        <div class="breadcrumb">Admin / <strong id="breadcrumb-current">Dashboard</strong></div>
                        <div class="topbar-subtitle">Manage storefront content, orders, shipping, and insights.</div>
                    </div>
                </div>
                <div class="topbar-actions">
                    <label class="global-search" for="admin-global-search"><i data-feather="search"></i><input id="admin-global-search" type="search" placeholder="Search current page..."></label>
                    <button class="icon-btn" type="button" aria-label="Notifications"><i data-feather="bell"></i></button>
                    <button class="profile-menu" type="button"><span class="profile-avatar">CH</span><span>Admin</span><i data-feather="chevron-down"></i></button>
                </div>
            </header>
            <div id="content-container"></div>
        </main>
    </div>

    <div id="footer-include" hidden></div>

    <script src="https://unpkg.com/feather-icons"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.10/dist/cdn.min.js?nounit=true" defer></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/admin-auth.js"></script>
    <script src="js/main.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/admin-dashboard.js"></script>
    <script src="js/admin-shipping.js"></script>
    <script>
        const contentContainer = document.getElementById('content-container');
        const shell = document.getElementById('admin-dashboard-shell');
        const menuButton = document.getElementById('admin-menu-button');
        const closeButton = document.getElementById('sidebar-close');
        const overlay = document.getElementById('admin-sidebar-overlay');
        const routeFallback = 'dashboard';

        function openSidebar() {
            shell?.classList.add('sidebar-open');
            document.body.classList.add('admin-sidebar-open');
            menuButton?.setAttribute('aria-expanded', 'true');
        }

        function closeSidebar() {
            shell?.classList.remove('sidebar-open');
            document.body.classList.remove('admin-sidebar-open');
            menuButton?.setAttribute('aria-expanded', 'false');
        }

        function setActiveMenu(activeLink) {
            document.querySelectorAll('.sidebar-link[data-page]').forEach((link) => {
                const active = link === activeLink;
                link.classList.toggle('active', active);
                if (active) link.setAttribute('aria-current', 'page');
                else link.removeAttribute('aria-current');
            });
            const title = activeLink?.dataset?.title || 'Dashboard';
            const crumb = document.getElementById('breadcrumb-current');
            if (crumb) crumb.textContent = title;
            document.title = `${title} | Carita Admin`;
        }

        function renderPlaceholder(title, description, ctaRoute, ctaLabel) {
            contentContainer.innerHTML = `
                <section class="admin-empty-panel admin-state admin-state--empty" role="status" aria-live="polite">
                    <h1>${title}</h1>
                    <p>${description}</p>
                    ${ctaRoute ? `<a class="admin-button admin-button--primary" href="#${ctaRoute}">${ctaLabel}</a>` : ''}
                </section>`;
        }

        function initializeLoadedPage(page, activeLink) {
            if (page === 'admin-analytics') {
                renderPlaceholder('Analytics belum dipisahkan', 'Ringkasan analytics saat ini tersedia di Dashboard. Gunakan CTA ini agar navigasi tetap jujur sampai halaman analytics khusus dibuat.', 'dashboard', 'Buka Dashboard');
            }
            if (page === 'admin-settings') {
                renderPlaceholder('Settings Center', 'Pengaturan umum belum memiliki modul khusus. Pengaturan ongkir tersedia di halaman Shipping.', 'shipping', 'Kelola Shipping');
            }
            if (page === 'admin-orders' && window.AdminOrdersPage) window.AdminOrdersPage.init();
            if (page === 'admin-dashboard' && window.AdminDashboardPage) window.AdminDashboardPage.init();
            if (page === 'admin-shipping' && window.AdminShippingPage) window.AdminShippingPage.init();
            if (window.Alpine) {
                window.AdminInitialContentTab = activeLink?.dataset?.tab || 'products';
                window.Alpine.initTree(contentContainer);
            }
            if (window.feather) window.safeFeatherReplace ? window.safeFeatherReplace() : window.feather.replace();
        }

        function loadContent(page, source, activeLink) {
            contentContainer.classList.add('is-loading');
            contentContainer.innerHTML = '<div class="loading-indicator admin-state admin-state--loading" role="status" aria-live="polite">Loading content...</div>';
            setActiveMenu(activeLink);
            closeSidebar();
            if (!source) {
                initializeLoadedPage(page, activeLink);
                contentContainer.classList.remove('is-loading');
                return;
            }
            window.AdminInitialContentTab = activeLink?.dataset?.tab || 'products';
            fetch(source)
                .then((response) => {
                    if (!response.ok) throw new Error('Failed to fetch content');
                    return response.text();
                })
                .then((html) => {
                    const parsed = new DOMParser().parseFromString(html, 'text/html');
                    contentContainer.innerHTML = parsed.body ? parsed.body.innerHTML : html;
                    setActiveMenu(activeLink);
                    initializeLoadedPage(page, activeLink);
                })
                .catch((error) => {
                    contentContainer.innerHTML = '<div class="admin-state admin-state--error" role="alert">Error loading content. Please refresh and try again.</div>';
                    console.error(error);
                })
                .finally(() => contentContainer.classList.remove('is-loading'));
        }

        function routeFromHash() { return (window.location.hash || `#${routeFallback}`).replace('#', '') || routeFallback; }
        function navigateToCurrentHash() {
            const link = document.querySelector(`.sidebar-link[data-route="${routeFromHash()}"]`) || document.querySelector(`.sidebar-link[data-route="${routeFallback}"]`);
            if (link) loadContent(link.dataset.page, link.dataset.source, link);
        }

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('sidebar-toggle')?.addEventListener('click', () => {
                shell?.classList.toggle('sidebar-collapsed');
                const collapsed = shell?.classList.contains('sidebar-collapsed');
                document.getElementById('sidebar-toggle')?.setAttribute('aria-expanded', String(!collapsed));
            });
            menuButton?.addEventListener('click', openSidebar);
            closeButton?.addEventListener('click', closeSidebar);
            overlay?.addEventListener('click', closeSidebar);
            document.addEventListener('keydown', (event) => { if (event.key === 'Escape') closeSidebar(); });
            document.getElementById('admin-global-search')?.addEventListener('input', (event) => {
                window.dispatchEvent(new CustomEvent('admin:global-search', { detail: event.target.value }));
            });
            document.getElementById('admin-logout-link')?.addEventListener('click', (event) => {
                event.preventDefault();
                if (window.AdminAuth?.logout) window.AdminAuth.logout();
                else window.location.href = 'login.html';
            });
            document.querySelectorAll('.sidebar-link[data-page]').forEach((link) => {
                link.addEventListener('click', (event) => {
                    event.preventDefault();
                    const route = link.dataset.route || routeFallback;
                    if (window.location.hash !== `#${route}`) window.location.hash = route;
                    else loadContent(link.dataset.page, link.dataset.source, link);
                });
            });
            window.addEventListener('hashchange', navigateToCurrentHash);
            if (!window.location.hash) window.history.replaceState(null, '', `#${routeFallback}`);
            navigateToCurrentHash();
        });
    </script>
</body>
</html>
